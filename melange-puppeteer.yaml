package:
  name: mapbender-puppeteer
  version: 4.2.5
  epoch: 0
  description: "Puppeteer (Node.js + Chromium) for Mapbender vector tile printing"
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - nodejs-22
      - chromium
      - font-liberation

environment:
  contents:
    repositories:
      - https://packages.wolfi.dev/os
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - busybox
      - ca-certificates-bundle
      - wolfi-base
      - nodejs-22
      - npm

pipeline:
  # Step 1: Install puppeteer globally via npm (skip Chromium download — we use Wolfi's chromium package)
  - runs: |
      set -ex
      export HOME=/tmp/puppeteer-build
      mkdir -p "$HOME"

      # Tell puppeteer to skip downloading Chromium (we use the system-installed one)
      export PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
      export PUPPETEER_SKIP_DOWNLOAD=true

      npm install -g puppeteer

      # Copy the global node_modules into the package
      dest="${{targets.destdir}}"
      mkdir -p "$dest/usr/local/lib/node_modules"
      cp -a /usr/local/lib/node_modules/puppeteer "$dest/usr/local/lib/node_modules/puppeteer"

      # Create a puppeteer config that points to the system Chromium.
      # This is critical because Symfony's Process class replaces the entire env,
      # so PUPPETEER_EXECUTABLE_PATH is lost. The config file in the application
      # directory (the cwd when print-vectortile.js runs) ensures puppeteer
      # always finds the browser regardless of environment.
      mkdir -p "$dest/var/mapbender/application"
      printf '%s\n' \
        "module.exports = {" \
        "  executablePath: '/usr/bin/chromium-browser'," \
        "};" \
        > "$dest/var/mapbender/application/.puppeteerrc.cjs"

      # Create puppeteer CLI symlink in PATH (the config check runs "which puppeteer")
      mkdir -p "$dest/usr/local/bin"
      ln -sf /usr/local/lib/node_modules/puppeteer/lib/cjs/puppeteer/node/cli.js "$dest/usr/local/bin/puppeteer"
      chmod 755 "$dest/usr/local/lib/node_modules/puppeteer/lib/cjs/puppeteer/node/cli.js"

      # Create a symlink at /var/mapbender/node_modules so Node resolves puppeteer from scripts
      mkdir -p "$dest/var/mapbender/node_modules"
      ln -sf /usr/local/lib/node_modules/puppeteer "$dest/var/mapbender/node_modules/puppeteer"
