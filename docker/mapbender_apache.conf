RemoteIPHeader X-Forwarded-For

# Pass container env vars to PHP (mod_php inherits these into $_ENV / $_SERVER)
PassEnv MB_PUPPETEER_NO_SANDBOX
PassEnv NODE_PATH
PassEnv PUPPETEER_CACHE_DIR
PassEnv PUPPETEER_EXECUTABLE_PATH

<VirtualHost *:8080>
    DocumentRoot /var/mapbender/application/public

    # If using mapbender behind an reverse-proxy
    #Alias /mapbender /var/mapbender/application/public

    <Directory /var/mapbender/application/public/>
        Options MultiViews FollowSymLinks

        DirectoryIndex index.php

        Require all granted

        SetEnvIf Authorization "(.*)" HTTP_AUTHORIZATION=$1

        RewriteEngine On
        RewriteBase /
        # If using mapbender behind an reverse-proxy
        #RewriteBase /mapbender/
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteRule ^(.*)$ index.php [QSA,L]
    </Directory>
</VirtualHost>
