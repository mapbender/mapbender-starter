package:
  name: mapbender-puppeteer
  version: 4.2.5
  epoch: 0
  description: "Puppeteer (Node.js + Chrome for Testing) for Mapbender vector tile printing"
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - nodejs-22
      - font-liberation
      # Minimal system libs required by Chrome for Testing
      - libx11
      - libxcomposite
      - libxdamage
      - libxext
      - libxfixes
      - libxrandr
      - alsa-lib
      - at-spi2-core
      - cairo
      - cups-libs
      - dbus-libs
      - libexpat1
      - mesa-gbm
      - libnspr
      - libnss
      - pango
      - libxcb
      - libxkbcommon

environment:
  contents:
    repositories:
      - https://packages.wolfi.dev/os
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - busybox
      - ca-certificates-bundle
      - wolfi-base
      - nodejs-22
      - npm

pipeline:
  # Step 1: Install puppeteer globally and download Chrome for Testing
  - runs: |
      set -ex
      export HOME=/tmp/puppeteer-build
      mkdir -p "$HOME"

      # Install puppeteer — skip default Chrome download, then fetch only chrome-headless-shell
      PUPPETEER_SKIP_DOWNLOAD=true npm install -g puppeteer
      npx -y @puppeteer/browsers install chrome-headless-shell@stable --path "$HOME/.cache/puppeteer"

      dest="${{targets.destdir}}"

      # Copy the global node_modules into the package
      mkdir -p "$dest/usr/local/lib/node_modules"
      cp -a /usr/local/lib/node_modules/puppeteer "$dest/usr/local/lib/node_modules/puppeteer"

      # Copy only chrome-headless-shell (not full Chrome)
      mkdir -p "$dest/opt/puppeteer-cache"
      cp -a "$HOME/.cache/puppeteer/chrome-headless-shell" "$dest/opt/puppeteer-cache/"

      # Find the chrome-headless-shell binary and record its path
      HEADLESS_BIN=$(find "$dest/opt/puppeteer-cache" -name "chrome-headless-shell" -type f | head -1)
      # Strip the destdir prefix to get the runtime path
      HEADLESS_RUNTIME_PATH="${HEADLESS_BIN#$dest}"
      echo "chrome-headless-shell binary at: $HEADLESS_RUNTIME_PATH"
      mkdir -p "$dest/usr/local/bin"
      ln -sf "$HEADLESS_RUNTIME_PATH" "$dest/usr/local/bin/chrome-headless-shell"

      # Create a puppeteer config that tells puppeteer where the cache is.
      # The cacheDirectory is critical because Symfony Process may not pass
      # all env vars through to the node child process.
      mkdir -p "$dest/var/mapbender/application"
      printf '%s\n' \
        "module.exports = {" \
        "  cacheDirectory: '/opt/puppeteer-cache'," \
        "};" \
        > "$dest/var/mapbender/application/.puppeteerrc.cjs"

      # Create puppeteer CLI symlink in PATH (the config check runs "which puppeteer")
      mkdir -p "$dest/usr/local/bin"
      ln -sf /usr/local/lib/node_modules/puppeteer/lib/cjs/puppeteer/node/cli.js "$dest/usr/local/bin/puppeteer"
      chmod 755 "$dest/usr/local/lib/node_modules/puppeteer/lib/cjs/puppeteer/node/cli.js"

      # Create a symlink at /var/mapbender/node_modules so Node resolves puppeteer from scripts
      mkdir -p "$dest/var/mapbender/node_modules"
      ln -sf /usr/local/lib/node_modules/puppeteer "$dest/var/mapbender/node_modules/puppeteer"
